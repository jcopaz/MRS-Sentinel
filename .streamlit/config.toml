# Configuração visual do Streamlit — Tema claro MRS
[theme]
base                = "light"
primaryColor        = "#1e3a5f"   # Azul-marinho MRS
backgroundColor     = "#ffffff"
secondaryBackgroundColor = "#f0f4f8"
textColor           = "#1f2937"
font                = "sans serif"

[server]
maxUploadSize       = 50          # MB — limite para planilhas SAP
enableStaticServing = true        # serve ./static/ em /app/static/ — usado pelo logo em vídeo (Sentinel_logo.mp4)

[browser]
gatherUsageStats    = false       # Privacidade corporativa
